<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="main">
        <div class="fundo_calculadora">

            <div>
                <div class="tela">
                <div class="tela" id="tela">

            </div>

            <!--div principal botoes-->
            <div>
                 <!--primeira coluna de botoes-->
                <div class="flex">
                    <button onclick="" class="botoes_numeros" id="n7">
                    <button class="botoes_numeros" id="n7">
                        <h1>7</h1>

                    </button>
                    <button onclick="" class="botoes_numeros" id="n8">
                    <button class="botoes_numeros" id="n8">
                        <h1>8</h1>

                    </button>
                    <button onclick="" class="botoes_numeros" id="n9">
                    <button class="botoes_numeros" id="n9">
                        <h1>9</h1>

                    </button>
                    <button onclick="" class="botoes_simbolos" id="mais">
                    <button class="botoes_simbolos" id="mais">
                        <h1>+</h1>

                    </button>

                </div>
                <!--segunda coluna de botoes-->
                <div class="flex">
                    <button class="botoes_numeros" id="n4">
                        <h1>4</h1>

                    </button>
                    <button class="botoes_numeros" id="n5">
                        <h1>5</h1>

                    </button>
                    <button class="botoes_numeros" id="n6">
                        <h1>6</h1>

                    </button>
                    <button class="botoes_simbolos" id="menos">
                        <h1>-</h1>

                    </button>

                </div>
                <!--terceira coluna de botoes-->
                <div class="flex">
                   <button class="botoes_numeros" id="n1">
                        <h1>1</h1>

                    </button>
                    <button class="botoes_numeros" id="n2">
                        <h1>2</h1>

                    </button>
                    <button class="botoes_numeros" id="n3">
                        <h1>3</h1>

                    </button>
                    <button class="botoes_simbolos" id="x">
                        <h1>X</h1>

                    </button>

                </div>
                <!--quarta coluna de botoes-->
                <div class="flex">
                    <button class="botoes_numeros" id="apaga">
                    <button class="botoes_simbolos" id="apaga">
                        <h1>⌫</h1>

                    </button>
                    <button class="botoes_numeros" id="n0">
                        <h1>0</h1>

                    </button>
                    <button class="botoes_numeros" id="igual">
                    <button class="botoes_simbolos" id="igual">
                        <h1>=</h1>

                    </button>
                    <button class="botoes_simbolos" id="divide">
                        <h1>÷</h1>

                    </button>

                </div>
            </div>
            </div>

        </div>

    </main>

    <script src="script.js"></script>
</body>
